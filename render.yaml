services:
  - type: web
    name: lexflow
    runtime: python
    buildCommand: pip install -r requirements.txt && npm --prefix frontend install && npm --prefix frontend run build
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: NODE_VERSION
        value: '20'
      - key: PYTHON_VERSION
        value: '3.12.3'
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
    plan: free

