services:
  - type: web
    name: lexflow
    runtime: python
    buildCommand: pip install -r requirements.txt && npm --prefix frontend install && npm --prefix frontend run build
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: NODE_VERSION
        value: '20'
      - key: PYTHON_VERSION
        value: '3.12.3'
